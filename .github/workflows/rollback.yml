name: Rollback Storedog Private ECR Tag

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - chore/actions

jobs:
  rollback-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Get Previous Image Tag
        id: get_tag
        run: |
          REPO_NAME="ye/storedog"

          echo "Searching for previous tag in $REPO_NAME..."

          PREV_TAG=$(aws ecr describe-images \
            --repository-name $REPO_NAME \
            --query 'sort_by(imageDetails[?imageTags!=null], &imagePushedAt)[-2].imageTags[?@ != `latest`] | [0]' \
            --output text)

          if [ "$PREV_TAG" == "None" ] || [ -z "$PREV_TAG" ]; then
            echo "Error: 롤백할 이전 이미지를 찾을 수 없습니다."
            exit 1
          fi

          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Found Previous Tag: $PREV_TAG"

      - name: Retag Image as Latest
        run: |
          REPO_NAME="ye/storedog"
          PREV_TAG=${{ steps.get_tag.outputs.tag }}

          echo "Targeting Tag: $PREV_TAG"

          MANIFEST=$(aws ecr batch-get-image --repository-name $REPO_NAME --image-ids imageTag=$PREV_TAG --query 'images[0].imageManifest' --output text)

          aws ecr put-image --repository-name $REPO_NAME --image-tag latest --image-manifest "$MANIFEST"

          echo "Success: 'latest' tag now points to $PREV_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/storedog 

            sed -i 's/^NEXT_PUBLIC_DD_VERSION_FRONTEND=.*/NEXT_PUBLIC_DD_VERSION_FRONTEND=1.3.3/' .env
            sed -i 's/^DD_VERSION_ADS=.*/DD_VERSION_ADS=1.3.3/' .env

            sudo rm -f ./services/backend/tmp/pids/server.pid || true

            echo ".env 버전 수정 완료: 1.3.3"

            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 065199070014.dkr.ecr.ap-northeast-2.amazonaws.com

            docker compose -f docker-compose.dev.yml pull frontend

            docker compose -f docker-compose.dev.yml up -d --no-deps --force-recreate frontend ads

            docker compose -f docker-compose.dev.yml restart service-proxy

            docker image prune -f
